<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IA de Aprendizaje</title>

  <link rel="stylesheet" href="/static/encuesta.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <div class="container">
    <h1>Realidáctica</h1>
    <p class="subtitle">Responde y descubre cómo aprendes mejor</p>

    <!-- QUIZ -->
    <div id="quiz">

      <!-- Barra de progreso -->
      <div class="progress-container">
        <div id="progressBar"></div>
      </div>

      <!-- Pregunta -->
      <h2 id="question"></h2>

      <!-- Opciones -->
      <div class="options">
        <button id="btnA" onclick="answer('A')"></button>
        <button id="btnB" onclick="answer('B')"></button>
        <button id="btnC" onclick="answer('C')"></button>
      </div>

    </div>

    <!-- RESULTADO -->
    <div id="result" class="hidden">
      <h2 id="learningType"></h2>
      <canvas id="chart"></canvas>

      <!-- BOTÓN VOLVER -->
      <button onclick="goToHome()">Volver al Inicio</button>
    </div>

  </div>

  <script src="/static/js/encuesta.js" defer></script>
</body>
</html>
