<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Realidáctica</title>
  <link rel="stylesheet" href="/static/login.css" />
</head>
<body>
  <main class="wrap">
    <h1 class="brand">Realidáctica</h1>

    <div class="mascot">
      <img src="/static/js/KADY3D.png" alt="Mascota" />
      <div class="aura aura--1"></div>
    </div>

    <form class="card form" method="post" action="/login">
      <h2>Iniciar sesión</h2>
      <div class="input-group">
        <input type="text" name="usuario" placeholder="Usuario" required />
      </div>
      <div class="input-group">
        <input type="password" name="password" placeholder="Contraseña" required />
      </div>
      
      <button type="submit" class="form__button" style="width:100%; padding:10px; background:#0fd3c7; border:none; border-radius:8px; cursor:pointer;">Entrar</button>
      
      <a href="/registro" style="display:block; width:100%; padding:10px; background:#f0f0f0; color:#333; border:none; border-radius:8px; cursor:pointer; text-align:center; text-decoration:none; margin-top:15px; box-sizing:border-box; font-size:14px;">Registro</a>
      
    </form>
  </main>
</body>
</html>
